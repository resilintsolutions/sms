version: "3.8"

services:
  # ═══════════ MySQL ═══════════
  mysql:
    image: mysql:8.0
    container_name: sms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-school_management}
      MYSQL_USER: ${DB_USERNAME:-sms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sms_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    networks:
      - sms
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══════════ Redis ═══════════
  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD:-6380}:6379"
    networks:
      - sms
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ═══════════ Laravel API (PHP-FPM) ═══════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_backend
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: ["sh", "/var/www/docker-entrypoint.sh"]
    command: ["php-fpm"]
    environment:
      APP_NAME: "School Management"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-school_management}
      DB_USERNAME: ${DB_USERNAME:-sms_user}
      DB_PASSWORD: ${DB_PASSWORD:-sms_password}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:3000,localhost:8000,127.0.0.1}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM_ADDRESS: "noreply@school.edu.bd"
      APP_LOCALE: bn
      APP_FALLBACK_LOCALE: en
      APP_TIMEZONE: Asia/Dhaka
    volumes:
      - app_public:/var/www/public
      - app_storage:/var/www/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sms

  # ═══════════ Nginx (reverse-proxy for Laravel) ═══════════
  nginx:
    image: nginx:1.27-alpine
    container_name: sms_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/public:ro
    ports:
      - "${NGINX_PORT:-8000}:80"
    depends_on:
      - backend
    networks:
      - sms

  # ═══════════ Next.js Frontend ═══════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://nginx:80
    container_name: sms_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://nginx:80
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - nginx
    networks:
      - sms

  # ═══════════ Queue Worker ═══════════
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_queue
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_NAME: "School Management"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-school_management}
      DB_USERNAME: ${DB_USERNAME:-sms_user}
      DB_PASSWORD: ${DB_PASSWORD:-sms_password}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APP_LOCALE: bn
      APP_FALLBACK_LOCALE: en
      APP_TIMEZONE: Asia/Dhaka
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sms

volumes:
  mysql_data:
  app_public:
  app_storage:

networks:
  sms:
    driver: bridge
